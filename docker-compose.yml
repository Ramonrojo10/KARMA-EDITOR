# KARMA OPS EDITOR - Docker Compose
# For local development and testing

version: '3.8'

services:
  # Application (frontend + backend)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgres://postgres:postgres@db:5432/karma_editing
      - JWT_SECRET=karma-ops-local-development-secret-key
      - N8N_WEBHOOK_URL=https://n8n2.0.karmaops.online/webhook/video-upload
      - FRONTEND_URL=http://localhost:4000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/tmp/uploads
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=karma_editing
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d karma_editing"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:
